name: Deploy Docs & Gallery

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  docs:
    name: Deploy MkDocs site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force

  gallery:
    name: Deploy gallery snapshot
    runs-on: ubuntu-latest
    needs: docs

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Collect static files
        run: uv run python example_project/manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: example_project.settings

      - name: Start dev server
        run: |
          uv run python example_project/manage.py runserver 8000 &
          # Wait for the server to be ready
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/ > /dev/null && break
            sleep 1
          done
        env:
          DJANGO_SETTINGS_MODULE: example_project.settings

      - name: Snapshot gallery with wget
        run: |
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --no-parent \
            --page-requisites \
            --reject "*.py,*.pyc" \
            --directory-prefix=gallery-snapshot \
            http://localhost:8000/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-out
          fetch-depth: 0

      - name: Copy gallery snapshot into gh-pages
        run: |
          rm -rf gh-pages-out/gallery
          mkdir -p gh-pages-out/gallery
          # wget mirrors to localhost:8000/ subdirectory
          if [ -d "gallery-snapshot/localhost:8000" ]; then
            cp -r gallery-snapshot/localhost:8000/. gh-pages-out/gallery/
          fi

      - name: Commit and push gallery
        run: |
          cd gh-pages-out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery/
          git diff --cached --quiet || git commit -m "chore: update gallery snapshot [skip ci]"
          git push
