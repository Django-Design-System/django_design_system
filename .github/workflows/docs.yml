name: Deploy Docs & Gallery

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build MkDocs site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install docs dependencies
        run: uv sync --extra docs

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/

  build-gallery:
    name: Build gallery snapshot
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Collect static files
        run: uv run python example_project/manage.py collectstatic --noinput
        env:
          DJANGO_SETTINGS_MODULE: example_project.settings

      - name: Start dev server
        run: |
          uv run python example_project/manage.py runserver 8000 &
          for i in $(seq 1 30); do
            curl -s http://localhost:8000/ > /dev/null && break
            sleep 1
          done
        env:
          DJANGO_SETTINGS_MODULE: example_project.settings

      - name: Snapshot gallery with wget
        run: |
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --no-parent \
            --page-requisites \
            --reject "*.py,*.pyc" \
            --directory-prefix=gallery-snapshot \
            http://localhost:8000/ || wget_exit=$?
          # Exit code 8 = server errors on individual pages (expected for broken demo
          # components); treat it as success so the snapshot still gets published.
          if [ "${wget_exit:-0}" -ne 0 ] && [ "${wget_exit:-0}" -ne 8 ]; then
            exit "$wget_exit"
          fi

      - name: Sanitise query-string filenames for artifact upload
        run: |
          # wget saves /_canvas/?component=… as files whose names contain '?'.
          # Artifact upload rejects '?' (NTFS-unsafe). Rename every such file by
          # replacing '?' with '__' and update all HTML references to match.
          # Use [?] in find so it matches a literal '?' (not any-char glob).
          find gallery-snapshot -type f -name '*[?]*' | while IFS= read -r src; do
            dst="${src//\?/__}"
            mv -f "$src" "$dst"
          done
          # Patch HTML files so iframe src / href attributes point to the new names.
          find gallery-snapshot -name '*.html' -exec \
            sed -i 's|?|__|g' {} +

      - name: Upload gallery artifact
        uses: actions/upload-artifact@v4
        with:
          name: gallery-snapshot
          path: gallery-snapshot/localhost:8000/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-docs, build-gallery]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download docs
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site/

      - name: Download gallery
        uses: actions/download-artifact@v4
        with:
          name: gallery-snapshot
          path: site/demo/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
